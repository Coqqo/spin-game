<!DOCTYPE html>
<html>
<head>
  <title>Spin Game</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #292929;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    /* CONTAINER */
    .container {
      max-width: 320px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Sekuya', sans-serif;
      font-size: 25px;
      color: #FF4040;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    button {
      background: #FF4040;
      color: white;
      border: none;
      padding: 15px;
      margin: 10px auto;
      font-size: 18px;
      cursor: pointer;
      border-radius: 15px;
      width: 100%;
      max-width: 220px;
      display: block;
    }

    button:hover {
      background: #ff1a1a;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🥵 Spin Game 🥵</h1>

  <button onclick="goTo('lieu.html')">Lieu</button>
  <button onclick="goTo('action.html')">Action</button>
  <button onclick="goTo('position.html')">Position</button>

</div>

<script>
function goTo(page) {
  window.location.href = page;
}
</script>

</body>
</html>
