<!DOCTYPE html>
<html>
<head>
  <title>Spin Game</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #292929;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-family: 'Sekuya', sans-serif;
      font-size: 30px;
      color: #FF4040;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* STYLE DE BASE */
    button {
      border: none;
      padding: 15px;
      margin: 10px 0;
      font-size: 18px;
      cursor: pointer;
      border-radius: 15px;
      width: 100%;
      max-width: 250px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: 0.2s;
    }

    /* LIEU */
    .btn-lieu {
      background: #FFDC3B;
      color: black;
    }

    .btn-lieu:hover {
      background: #ffe880;
    }

    /* ACTION */
    .btn-action {
      background: #FF8524;
      color: black;
    }

    .btn-action:hover {
      background: #ffba81;
    }

    /* POSITION */
    .btn-position {
      background: #FF4040;
      color: black;
    }

    .btn-position:hover {
      background: #ff6464;
    }

    /* PETIT EFFET */
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🥵 Spin Game 🥵</h1>

  <button class="btn-lieu" onclick="goTo('lieu.html')">Lieu</button>
  <button class="btn-action" onclick="goTo('action.html')">Action</button>
  <button class="btn-position" onclick="goTo('position.html')">Position</button>

</div>

<script>
function goTo(page) {
  window.location.href = page;
}
</script>

</body>
</html>
