<!DOCTYPE html>
<html>
<head>
  <title>Lieu</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

   body {
  background: #292929;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;

  display: flex;
  justify-content: center;
}

    /* CONTAINER CENTRÉ */
    .container {
  max-width: 100px;
  width: 100%;
  text-align: center;
}

    h1 {
      font-family: 'Sekuya', sans-serif;
      font-size: 30px;
      color: #FF4040;
      letter-spacing: 2px;
    }

    #result {
      font-size: 26px;
      margin: 30px 0;
      color: white;
      min-height: 40px;
    }

    .result-active {
      color: #FF4040;
    }

    button {
      background: #FF4040;
      color: white;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 15px;
      cursor: pointer;
      width: 100%;
      max-width: 250px;
    }

    button:hover {
      background: #ff1a1a;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>📍 Lieu</h1>

  <div id="result">Clique pour jouer</div>

  <button onclick="spin()">Lancer</button>

</div>

<script>
const items = [
  "Salle de bain", "Cuisine", "Salon", "Chambre",
  "Balcon", "Terrasse", "Parc", "Plage", "Voiture"
];

function spin() {
  let resultDiv = document.getElementById("result");

  // Passe en rouge après clic
  resultDiv.classList.add("result-active");

  let count = 0;

  const interval = setInterval(() => {
    const random = Math.floor(Math.random() * items.length);
    resultDiv.innerText = items[random];
    count++;

    if (count > 15) clearInterval(interval);
  }, 100);
}
</script>

</body>
</html>
