<!DOCTYPE html>
<html>
<head>
  <title>Position</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #292929;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 320px;
      margin: auto;
    }

    h1 {
      font-family: 'Sekuya', sans-serif;
      font-size: 28px;
      color: #FF4040;
      letter-spacing: 2px;
      margin-bottom: 25px;
    }

    .scroll-container {
      height: 200px;
      overflow: hidden;
      position: relative;
      margin: 20px 0 25px;
      border-radius: 15px;
      background: #1f1f1f;
      border: 2px solid #FF4040;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-container::before,
    .scroll-container::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 45px;
      z-index: 2;
      pointer-events: none;
    }

    .scroll-container::before {
      top: 0;
      background: linear-gradient(to bottom, #1f1f1f, transparent);
    }

    .scroll-container::after {
      bottom: 0;
      background: linear-gradient(to top, #1f1f1f, transparent);
    }

    #scroll-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .item {
      height: 40px;
      line-height: 40px;
      width: 100%;
      font-size: 18px;
      opacity: 0.35;
      transition: all 0.2s ease;
      color: white;
      padding: 0 10px;
    }

    .item.active {
      font-size: 22px;
      opacity: 1;
      color: #FF4040;
      font-weight: bold;
      transform: scale(1.08);
      text-shadow: 0 0 8px rgba(255, 64, 64, 0.35);
    }

    #result {
      font-size: 24px;
      margin: 20px 0 15px;
      min-height: 34px;
      color: white;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    #result-image {
      display: none;
      width: 100%;
      max-width: 220px;
      margin: 10px auto 25px;
      border-radius: 15px;
      object-fit: cover;
    }

    button {
      background: #FF4040;
      color: white;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 15px;
      cursor: pointer;
      width: 100%;
      max-width: 220px;
      margin: auto;
      display: block;
      transition: 0.2s;
    }

    button:hover {
      background: #ff6464;
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>💘 Position 💘</h1>

    <div class="scroll-container">
      <div id="scroll-list"></div>
    </div>

    <div id="result">Clique pour jouer</div>
    <img id="result-image" src="" alt="Position">

    <button onclick="spin()">Lancer</button>
  </div>

  <script>
    const items = [
      { name: "Levrette", image: "images/levrette.png" },
      { name: "69", image: "images/69.png" },
      { name: "Le bateau ivre", image: "images/le-bateau-ivre.png" },
      { name: "La chaise longue", image: "images/chaise-longue.png" },
      { name: "Le compas", image: "images/compas.png" },
      { name: "Le néophyte", image: "images/neophyte.png" },
      { name: "Le tendre amant", image: "images/tendre-amant.png" },
      { name: "La chaise à bascule", image: "images/chaise-a-bascule.png" },
      { name: "Les petites cuillères", image: "images/petites-cuilleres.png" },
      { name: "Missionnaire", image: "images/missionnaire.png" },
      { name: "Celui qui reste à la maison", image: "images/celui-qui-reste-a-la-maison.png" },
      { name: "L’andromaque", image: "images/andromaque.png" },
      { name: "L’union des lotus", image: "images/union-des-lotus.png" },
      { name: "Le cerf en rut", image: "images/cerf-en-rut.png" },
      { name: "Le cheval renversé", image: "images/cheval-renverse.png" },
      { name: "La berceuse", image: "images/berceuse.png" },

      { name: "Sur une chaise", image: "images/sur-une-chaise.png" },
      { name: "Levrette debout", image: "images/levrette-debout.png" },
      { name: "Chevauche", image: "images/chevauche.png" },
      { name: "Brouette espagnole", image: "images/brouette-espagnole.png" },
      { name: "Le grand écart", image: "images/le-grand-ecart.png" },
      { name: "Prendre ses jambes à son cou", image: "images/prendre-ses-jambes-a-son-cou.png" },
      { name: "La culbute", image: "images/la-culbute.png" },
      { name: "Le collier de Vénus", image: "images/le-collier-de-venus.png" },
      { name: "L’aurore boréale", image: "images/aurore-boreale.png" },
      { name: "La bête à deux têtes", image: "images/la-bete-a-deux-tete.png" },
      { name: "L’artilleur", image: "images/artilleur.png" },
      { name: "La danse aux joyeuses faveurs", image: "images/la-danse-au-joyeuse-faveurs.png" },
      { name: "Le charmeur de serpents", image: "images/le-charmeur-de-serpents.png" },
      { name: "L’équerre", image: "images/equerre.png" },
      { name: "La fleur éclatée", image: "images/la-fleur-eclatee.png" },
      { name: "L’indolent", image: "images/indolent.png" },
      { name: "L’écrin à bijoux", image: "images/ecrin-a-bijoux.png" },
      { name: "La belle endormie", image: "images/la-belle-endormie.png" },
      { name: "L’offrande secrète", image: "images/offrande-secrete.png" },
      { name: "La levrette du macho", image: "images/la-levrette-du-macho.png" },
      { name: "La grenouille à la nage", image: "images/la-grenouille-a-la-nage.png" }
    ];

    function render(activeIndex) {
      const list = document.getElementById("scroll-list");
      list.innerHTML = "";

      for (let i = -2; i <= 2; i++) {
        const current = (activeIndex + i + items.length) % items.length;
        const div = document.createElement("div");
        div.className = "item";
        if (i === 0) div.classList.add("active");
        div.innerText = items[current].name;
        list.appendChild(div);
      }
    }

    render(0);

    function spin() {
      const resultDiv = document.getElementById("result");
      const resultImage = document.getElementById("result-image");

      resultImage.style.display = "none";

      let speed = 60;
      let count = 0;
      const maxCount = 22;
      const finalIndex = Math.floor(Math.random() * items.length);

      function animate() {
        let currentIndex;

        if (count < maxCount - 1) {
          currentIndex = Math.floor(Math.random() * items.length);
        } else {
          currentIndex = finalIndex;
        }

        render(currentIndex);
        count++;

        if (count < maxCount) {
          speed += 18;
          setTimeout(animate, speed);
        } else {
          const finalItem = items[finalIndex];
          resultDiv.innerText = finalItem.name;
          resultImage.src = finalItem.image;
          resultImage.alt = finalItem.name;
          resultImage.style.display = "block";
        }
      }

      animate();
    }
  </script>

</body>
</html>
