<!DOCTYPE html>
<html>
<head>
  <title>Position</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #292929;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 320px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Sekuya', sans-serif;
      font-size: 28px;
      color: #FF4040;
      letter-spacing: 2px;
      margin-bottom: 25px;
    }

    #result {
      font-size: 24px;
      margin: 25px 0 15px;
      color: white;
      min-height: 34px;
    }

    .result-active {
      color: #FF4040;
    }

    #result-image {
      display: none;
      width: 100%;
      max-width: 220px;
      margin: 10px auto 25px;
      border-radius: 15px;
      object-fit: cover;
    }

    button {
      background: #FF4040;
      color: white;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 15px;
      cursor: pointer;
      width: 100%;
      max-width: 220px;
      display: block;
      margin: 0 auto;
    }

    button:hover {
      background: #ff1a1a;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>💘 Position</h1>

    <div id="result">Clique pour jouer</div>
    <img id="result-image" src="" alt="Position">

    <button onclick="spin()">Lancer</button>
  </div>

  <script>
    const items = [
      { name: "Levrette", image: "images/levrette.png" },
      { name: "69", image: "images/69.png" },
      { name: "Le bateau ivre", image: "images/le-bateau-ivre.png" },
      { name: "La chaise longue", image: "images/chaise-longue.png" },
      { name: "Le compas", image: "images/compas.png" },
      { name: "Le néophyte", image: "images/neophyte.png" },
      { name: "Le tendre amant", image: "images/tendre-amant.png" },
      { name: "La chaise à bascule", image: "images/chaise-a-bascule.png" },
      { name: "Les petites cuillères", image: "images/petites-cuilleres.png" },
      { name: "Missionnaire", image: "images/missionnaire.png" },
      { name: "Celui qui reste à la maison", image: "images/celui-qui-reste-a-la-maison.png" },
      { name: "L’andromaque", image: "images/andromaque.png" },
      { name: "L’union des lotus", image: "images/union-des-lotus.png" },
      { name: "Le cerf en rut", image: "images/cerf-en-rut.png" },
      { name: "Le cheval renversé", image: "images/cheval-renverse.png" },
      { name: "La berceuse", image: "images/berceuse.png" }
    ];

    function spin() {
      const resultDiv = document.getElementById("result");
      const resultImage = document.getElementById("result-image");

      resultDiv.classList.add("result-active");
      resultImage.style.display = "none";

      let count = 0;

      const interval = setInterval(() => {
        const random = Math.floor(Math.random() * items.length);
        resultDiv.innerText = items[random].name;
        count++;

        if (count > 15) {
          clearInterval(interval);

          const finalRandom = Math.floor(Math.random() * items.length);
          resultDiv.innerText = items[finalRandom].name;
          resultImage.src = items[finalRandom].image;
          resultImage.alt = items[finalRandom].name;
          resultImage.style.display = "block";
        }
      }, 100);
    }
  </script>

</body>
</html>
