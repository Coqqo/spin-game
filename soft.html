<!DOCTYPE html>
<html>
<head>
  <title>Soft</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #292929;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 320px;
      margin: auto;
    }

    h1 {
      font-family: 'Sekuya', sans-serif;
      font-size: 28px;
      color: #4AB7FF;
      letter-spacing: 2px;
    }

    /* 🎰 SLOT STYLE */
    .scroll-container {
      height: 200px;
      overflow: hidden;
      position: relative;
      margin: 20px 0 25px;
      border-radius: 15px;
      background: #1f1f1f;
      border: 2px solid #4AB7FF;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-container::before,
    .scroll-container::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 45px;
      z-index: 2;
    }

    .scroll-container::before {
      top: 0;
      background: linear-gradient(to bottom, #1f1f1f, transparent);
    }

    .scroll-container::after {
      bottom: 0;
      background: linear-gradient(to top, #1f1f1f, transparent);
    }

    #scroll-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .item {
      height: 40px;
      line-height: 40px;
      width: 100%;
      font-size: 18px;
      opacity: 0.35;
      transition: all 0.2s ease;
      color: white;
    }

    .item.active {
      font-size: 22px;
      opacity: 1;
      color: #4AB7FF;
      font-weight: bold;
      transform: scale(1.08);
      text-shadow: 0 0 8px rgba(74,183,255,0.4);
    }

    #result {
      font-size: 24px;
      margin: 20px 0;
      min-height: 34px;
    }

    button {
      background: #4AB7FF;
      color: black;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 15px;
      cursor: pointer;
      width: 100%;
      max-width: 220px;
      margin: auto;
      display: block;
      transition: 0.2s;
    }

    button:hover {
      background: #84ceff;
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>💦 Soft 💦</h1>

  <div class="scroll-container">
    <div id="scroll-list"></div>
  </div>

  <div id="result">Clique pour jouer</div>

  <button onclick="spin()">Lancer</button>

</div>

<script>
const items = [
  "Bisous dans le cou",
  "Bisous sur le corps",
  "Smack",
  "Galoche",
  "Léchage d’oreille",
  "Léchage de lèvres",
  "Enlever un vêtement",
  "Bisou passionné",
  "Caressage du corps",
  "Serrer les seins",
  "Tirage de cheveux",
  "Mordre le corps",
  "Câlin",
  "Faire la bise",
  "Lécher les lèvres",
  "Léchage de langue",
  "Caresser les seins",
  "Massage",
  "Flash seins",
  "Gifle avec les seins",
  "Biflette"
];

function render(activeIndex) {
  const list = document.getElementById("scroll-list");
  list.innerHTML = "";

  for (let i = -2; i <= 2; i++) {
    const current = (activeIndex + i + items.length) % items.length;

    const div = document.createElement("div");
    div.className = "item";

    if (i === 0) div.classList.add("active");

    div.innerText = items[current];
    list.appendChild(div);
  }
}

render(0);

function spin() {
  const resultDiv = document.getElementById("result");

  let speed = 60;
  let count = 0;
  const maxCount = 22;
  const finalIndex = Math.floor(Math.random() * items.length);

  function animate() {
    let currentIndex;

    if (count < maxCount - 1) {
      currentIndex = Math.floor(Math.random() * items.length);
    } else {
      currentIndex = finalIndex;
    }

    render(currentIndex);
    count++;

    if (count < maxCount) {
      speed += 18;
      setTimeout(animate, speed);
    } else {
      resultDiv.innerText = items[finalIndex];
    }
  }

  animate();
}
</script>

</body>
</html>
